services:
    backend:
        image: golang:1.25-alpine
        working_dir: /app
        command: >
            sh -c "go run ./cmd/migrate && go run ./cmd/api"
        environment:
            PORT: '8080'
            JWT_SECRET: 'change-me-in-production'
            HOMELEDGER_DB_PATH: '/app/storage/homeledger.db'
        ports:
            - '8080:8080'
        volumes:
            - ./backend:/app
            - backend-go-mod-cache:/go/pkg/mod
            - backend-storage-dev:/app/storage

    frontend:
        image: node:22-alpine
        working_dir: /app
        command: >
            sh -c "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0 --port 3000"
        depends_on:
            - backend
        ports:
            - '3000:3000'
        volumes:
            - ./frontend:/app
            - frontend-node-modules:/app/node_modules
            - frontend-pnpm-store:/root/.local/share/pnpm/store

volumes:
    backend-go-mod-cache:
    backend-storage-dev:
    frontend-node-modules:
    frontend-pnpm-store:
