services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      JWT_SECRET: "change-me-in-production"
      HOMELEDGER_DB_PATH: "/app/storage/homeledger.db"
    ports:
      - "8080:8080"
    volumes:
      - backend-storage:/app/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: "http://localhost:8080"

volumes:
  backend-storage:
